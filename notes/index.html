<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Reading notes by Chen Tang on operations management, platforms, flexibility, sustainability, and AI."
    />
    <title>Reading Notes · Chen Tang</title>
    <link
      rel="icon"
      href="https://www.gatech.edu/themes/custom/gatech/favicon.ico"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&amp;family=Fraunces:opsz,wght@9..144,500;9..144,600&amp;family=IBM+Plex+Mono:wght@400;500&amp;display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css"
    />
    <link rel="stylesheet" href="../assets/css/site.css?v=20260630h" />
    <link rel="stylesheet" href="../assets/css/notes.css?v=20260630" />
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [["$", "$"], ["\\(", "\\)"]],
          displayMath: [["$$", "$$"], ["\\[", "\\]"]],
          processEscapes: true
        },
        options: { skipHtmlTags: ["script", "noscript", "style", "textarea", "pre", "code"] },
        startup: { typeset: false }
      };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3.2.2/es5/tex-chtml.js"></script>
    <script defer src="../assets/js/notes.js?v=20260629"></script>
  </head>
  <body class="notes-page">
    <div class="reading-progress" aria-hidden="true">
      <span data-reading-progress></span>
    </div>

    <header class="reader-header">
      <a class="reader-header__home" href="../index.html#notes">
        <span aria-hidden="true">←</span> Chen Tang
      </a>
      <div class="reader-header__meta">
        <span data-note-count>Reading notes</span>
        <span class="reader-header__dot" aria-hidden="true"></span>
        <span data-reading-time>Living document</span>
      </div>
    </header>

    <main>
      <section class="notes-hero">
        <div class="notes-hero__inner">
          <h1>Reading Notes</h1>
        </div>
      </section>

      <div class="reader-layout">
        <aside class="notes-toc" aria-label="Notes on this page">
          <div class="notes-toc__sticky">
            <p class="eyebrow">On this page</p>
            <nav id="notes-toc">
              <span class="notes-toc__loading">Building the index…</span>
            </nav>
          </div>
        </aside>

        <article
          class="markdown-body"
          id="notes-content"
          aria-live="polite"
          aria-busy="true"
        >
          <div class="notes-loading">
            <span></span>
            <p>Opening the notebook…</p>
          </div>
        </article>
      </div>
    </main>

    <footer class="reader-footer">
      <a href="../index.html#notes">← Return to the homepage</a>
      <p>Notes by Chen Tang</p>
    </footer>
  </body>
</html>
